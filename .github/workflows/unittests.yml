name: "Unittests"
on:
  pull_request:
permissions:
  contents: read
  actions: read
  checks: write
jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - run: npm run test:ci

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }} # run this step even if previous step failed
        with:
          name: Vitest Tests
          path: test-results.xml
          reporter: java-junit
